ignores:
  - ".claude/**"
  - "node_modules/**"

config:
  MD013:
    line_length: 200
    tables: false        # Tables often have long rows — exclude
    code_blocks: false   # Code blocks need exact formatting — exclude
  MD024:
    siblings_only: true  # Allow duplicate headings in different sections
  MD032: true            # Blanks around lists
  MD033: false           # Inline HTML — used in standards docs
  MD034: true            # No bare URLs
  MD041: true            # First line must be a top-level heading
  MD049: false           # Emphasis style — allow both * and _ in standards docs
  MD050: false           # Strong style — allow both ** and __ in standards docs
  MD054: false           # Link and image style — allow various formats in docs
  MD055: false           # Table pipe style — allow flexible table formatting
  MD056: false           # Table column count — allow varying column widths
  MD058: false           # Blanks around tables — not always practical in docs
  MD060: false           # Table column style — too strict for compact tables
