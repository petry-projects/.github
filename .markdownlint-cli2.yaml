ignores:
  - ".claude/**"
  - "node_modules/**"

config:
  MD013:
    line_length: 200
    tables: false        # Tables often have long rows — exclude
    code_blocks: false   # Code blocks need exact formatting — exclude
  MD024:
    siblings_only: true  # Allow duplicate headings in different sections
  MD032: true            # Blanks around lists
  MD033: false           # Inline HTML — used in standards docs
  MD034: true            # No bare URLs
  MD041: true            # First line must be a top-level heading
  MD049: false           # Emphasis style — docs intentionally use both * and _
  MD050: false           # Strong style — docs intentionally use both * and __
  MD054: false           # Link and image style — varied link formats used
  MD055: false           # Table pipe style — mixed table formats in docs
  MD056: false           # Table column count — some tables have irregular shapes
  MD058: false           # Blanks around tables — too strict for inline table docs
  MD060: false           # Table column style — too strict for compact tables
