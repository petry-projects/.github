# Regression guard for SonarCloud GitHub Actions dependency-hardening findings
# (issue #623): every workflow `pip install` must be hash-/binary-locked and
# every `npx` must run with `--ignore-scripts`. See test/workflows/dependency-hardening.bats.
name: Dependency Hardening Tests

on:
  pull_request:
    paths:
      - '.github/workflows/**'
      - 'scripts/*-requirements.txt'
      - 'test/workflows/dependency-hardening.bats'
      - '.github/workflows/dependency-hardening-tests.yml'
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - 'scripts/*-requirements.txt'
      - 'test/workflows/dependency-hardening.bats'
      - '.github/workflows/dependency-hardening-tests.yml'

permissions: {}

concurrency:
  group: dependency-hardening-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: bats
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install bats
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends bats

      - name: bats
        run: bats --print-output-on-failure test/workflows/dependency-hardening.bats
