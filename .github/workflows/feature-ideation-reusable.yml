name: Feature Ideation (Reusable)

on:
  workflow_call:
    inputs:
      project_context:
        description: |
          3-5 sentence description of the project, its target users, and the
          competitive landscape Mary should research. The more specific you
          are, the more useful the proposals. This is the only required input.
        required: true
        type: string
      focus_area:
        description: 'Optional focus area to steer research (e.g., "accessibility", "performance")'
        required: false
        default: ''
        type: string
      research_depth:
        description: 'Research depth: quick | standard | deep'
        required: false
        default: 'standard'
        type: string
      model:
        description: 'Anthropic model ID. Opus 4.6 is the default and recommended — Sonnet produces shallower adversarial passes.'
        required: false
        default: 'claude-opus-4-6'
        type: string
      timeout_minutes:
        description: 'Timeout for the analyst job (the gather-signals job has its own short timeout).'
        required: false
        default: 60
        type: number
