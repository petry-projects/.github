# Reusable Claude Code workflow — single source of truth for the org.
# Repo-level claude.yml files call this to avoid duplicating the prompt and config.
# Standard: https://github.com/petry-projects/.github/blob/main/standards/ci-standards.md#4-claude-code-claudeyml
name: Claude Code (Reusable)

on:
  workflow_call:
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        description: "Claude Code OAuth token for API access"
        required: true
      GH_PAT_WORKFLOWS:
        description: "PAT with workflows scope — lets Claude push .github/workflows/ changes"
        required: false

jobs:
  # Interactive mode: PR reviews and @claude mentions from trusted human contributors.
  # Bot review comments (CodeRabbit, Copilot, Gemini) are handled by claude-fix-review-comments below.
  claude:
    if: >-
      (github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        github.event.pull_request.user.login != 'dependabot[bot]') ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request &&
        github.event.comment.user.login != 'claude[bot]' &&
        contains(fromJson('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) ||
      (github.event_name == 'pull_request_review_comment' &&
        github.event.comment.user.login != 'claude[bot]' &&
        contains(fromJson('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association))
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      id-token: write
      pull-requests: write
      issues: write
      actions: read
      checks: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Full history so Claude can rebase / pull / resolve conflicts against main.
          fetch-depth: 0
          token: ${{ secrets.GH_PAT_WORKFLOWS || github.token }}
      - name: Run Claude Code
        uses: anthropics/claude-code-action@51ea8ea73a139f2a74ff649e3092c25a904aed7e # v1.0.123
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
            checks: read
          # yamllint disable rule:line-length
          claude_args: |
            --allowedTools "Bash(git:*),Bash(gh:*),Bash(grep:*),Bash(find:*),Bash(jq:*),Bash(sed:*),Bash(awk:*),Bash(cat:*),Bash(ls:*),Bash(head:*),Bash(tail:*),Bash(wc:*),Bash(test:*),Edit,Write,Read,Grep,Glob,LS,MultiEdit,WebFetch,WebSearch,Task,TodoWrite,BashOutput,KillBash"
          # yamllint enable rule:line-length

  # Automation mode: bot review-comment responder — address all open threads, fix CI, repeat
  claude-fix-review-comments:
    if: >-
      github.event_name == 'pull_request_review_comment' &&
      github.event.comment.user.login != 'claude[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      contains(fromJson('["coderabbitai[bot]","Copilot","copilot-pull-request-reviewer[bot]","gemini-code-assist[bot]"]'), github.event.comment.user.login)
    concurrency:
      group: claude-review-comments-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      id-token: write
      pull-requests: write
      issues: write
      actions: read
      checks: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          token: ${{ secrets.GH_PAT_WORKFLOWS || github.token }}
      - name: Run Claude Code
        uses: anthropics/claude-code-action@51ea8ea73a139f2a74ff649e3092c25a904aed7e # v1.0.123
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GH_PAT_WORKFLOWS || github.token }}
          # yamllint disable rule:line-length
          claude_args: |
            --allowedTools "Bash(gh pr checkout:*),Bash(gh pr view:*),Bash(gh pr comment:*),Bash(gh pr checks:*),Bash(gh run view:*),Bash(gh run list:*),Bash(gh run watch:*),Bash(gh api:*),Bash(git*:*),Edit,Write"
          # yamllint enable rule:line-length
          # yamllint disable rule:line-length
          prompt: |
            A reviewer has left a comment on PR #${{ github.event.pull_request.number }} (${{ github.event.pull_request.html_url }}).

            **Note:** This automation requires `GH_PAT_WORKFLOWS` secret to be configured for CI results after pushing. Without it, GitHub suppresses CI runs for GITHUB_TOKEN pushes, causing CI waits to fail silently.

            Your job: work through ALL open (unresolved) review threads on this PR and bring it to a passing, fully-reviewed state. Repeat the cycle below until CI is green and every addressable thread is resolved.

            ## Cycle

            ### 1. Check out the PR branch and rebase onto latest main
            ```
            gh pr checkout ${{ github.event.pull_request.number }}
            git fetch origin ${{ github.event.pull_request.base.ref }}
            git rebase origin/${{ github.event.pull_request.base.ref }}
            git push --force-with-lease
            ```
            If the rebase has conflicts, resolve them, then `git rebase --continue` before pushing.

            ### 2. Fetch all open review threads (collect node IDs — you need them to resolve threads later)
            ```
            gh api graphql -f query='query { repository(owner:"${{ github.repository_owner }}", name:"${{ github.event.repository.name }}") { pullRequest(number:${{ github.event.pull_request.number }}) { reviewThreads(first:250) { nodes { id isResolved comments(first:10) { nodes { path line body author { login } } } } } } } }'
            ```

            ### 3. Address each unresolved thread
            For each thread where `isResolved` is false:
            - Read the comment body and understand the concern.
            - Apply the appropriate fix to the file. If the reviewer included a `suggestion` block, apply it unless you have a clear reason not to.
            - If a comment needs a human decision (architectural choice, ambiguous requirement), reply to the thread explaining what decision is needed and skip resolving it — leave it unresolved for the human.

            ### 4. Commit and push all fixes in one commit
            ```
            git config user.name "claude[bot]"
            git config user.email "claude[bot]@users.noreply.github.com"
            git add -A
            git diff --cached --quiet || git commit -m "fix: address review comments"
            git push
            ```
            If there are no staged changes (all open threads needed human input), skip the commit and push.

            ### 5. Resolve each thread you addressed via GraphQL (use the node IDs from step 2)
            ```
            gh api graphql -f query='mutation { resolveReviewThread(input: {threadId: "THREAD_NODE_ID"}) { thread { isResolved } } }'
            ```
            Replace THREAD_NODE_ID with the actual `id` value for each thread.

            ### 6. Wait for CI and fix any failures
            ```
            gh pr checks ${{ github.event.pull_request.number }} --watch --interval 30
            ```
            If any check fails:
            - Read the logs: `gh run view <run-id> --log-failed`
            - Fix the issue, commit, push, and loop back to step 6.
            - Do NOT give up after a single CI failure — keep fixing until all checks pass.

            ### 7. Check for newly opened threads
            After pushing, re-run step 2 to check for any new review threads created in response to your changes. Address them if present.

            ### 8. Post a summary comment on the PR
            When CI is green and all addressable threads are resolved, post a comment summarising:
            - What changes were made and why
            - Which review threads were resolved
            - Any threads left unresolved and why they need human input
          # yamllint enable rule:line-length
          additional_permissions: |
            actions: read
            checks: read

  # Automation mode: CI failure response — diagnose and fix failing checks on PRs
  claude-ci-fix:
    if: >-
      github.event_name == 'workflow_run' &&
      (github.event.workflow_run.conclusion == 'failure' || github.event.workflow_run.conclusion == 'timed_out') &&
      github.event.workflow_run.pull_requests[0] != null &&
      github.event.workflow_run.pull_requests[0].head.repo.full_name == github.repository
    concurrency:
      group: claude-ci-fix-${{ github.event.workflow_run.head_sha }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      id-token: write
      pull-requests: write
      issues: write
      actions: read
      checks: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          token: ${{ secrets.GH_PAT_WORKFLOWS || github.token }}
      - name: Run Claude Code
        uses: anthropics/claude-code-action@51ea8ea73a139f2a74ff649e3092c25a904aed7e # v1.0.123
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GH_PAT_WORKFLOWS || github.token }}
          # yamllint disable rule:line-length
          claude_args: |
            --allowedTools "Bash(gh pr checkout:*),Bash(gh pr view:*),Bash(gh pr comment:*),Bash(gh run view:*),Bash(gh run list:*),Bash(gh run watch:*),Bash(gh api:*),Bash(git*:*),Edit,Write"
          # yamllint enable rule:line-length
          # yamllint disable rule:line-length
          prompt: |
            CI workflow "${{ github.event.workflow_run.name }}" has failed on PR #${{ github.event.workflow_run.pull_requests[0].number }}.

            Run details:
            - Workflow: ${{ github.event.workflow_run.name }}
            - Conclusion: ${{ github.event.workflow_run.conclusion }}
            - Head SHA: ${{ github.event.workflow_run.head_sha }}
            - Run URL: ${{ github.event.workflow_run.html_url }}

            Please diagnose and fix the failure:
            1. Check out the PR branch: `gh pr checkout ${{ github.event.workflow_run.pull_requests[0].number }}`
            2. Read the failure logs: `gh run view ${{ github.event.workflow_run.id }} --log-failed`
            3. Read the relevant source files and understand the root cause.
            4. Apply the minimal fix needed to address the reported issues.
            5. Commit and push the fix to the PR branch.
            6. Leave a concise comment on PR #${{ github.event.workflow_run.pull_requests[0].number }} explaining what you found and what you changed.
          # yamllint enable rule:line-length

  # Automation mode: issue-triggered work — implement, open PR, review, and notify
  claude-issue:
    if: >-
      github.event_name == 'issues' && github.event.action == 'labeled' &&
        github.event.label.name == 'claude'
    concurrency:
      group: claude-issue-${{ github.event.issue.number || github.run_id }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      id-token: write
      pull-requests: write
      issues: write
      actions: read
      checks: read
      # Note: GitHub Actions does NOT expose an "administration" permission scope.
      # Admin operations (create rulesets, enable Discussions, etc.) work via the
      # GH_PAT_WORKFLOWS token below, which must be a classic PAT with `repo` scope
      # (or fine-grained with Administration:write) for those calls to succeed.
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          token: ${{ secrets.GH_PAT_WORKFLOWS || github.token }}
      - name: Check for existing open PR
        id: dedup
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_WORKFLOWS || github.token }}
          ISSUE: ${{ github.event.issue.number }}
        run: |
          # Search by branch prefix (claude/issue-NNN-*)
          PR_URL=$(gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --state open \
            --json number,url,headRefName \
            --jq ".[] | select(.headRefName | startswith(\"claude/issue-${ISSUE}-\")) | .url" \
            | head -1)

          # Fallback: search PR body for "Closes #NNN"
          if [ -z "$PR_URL" ]; then
            PR_URL=$(gh pr list \
              --repo "$GITHUB_REPOSITORY" \
              --state open \
              --search "Closes #${ISSUE} in:body" \
              --json url \
              --jq '.[0].url' 2>/dev/null || true)
          fi

          if [ -n "$PR_URL" ]; then
            echo "existing_pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
            gh issue comment "$ISSUE" \
              --repo "$GITHUB_REPOSITORY" \
              --body "An open PR already addresses this issue: $PR_URL — skipping new Claude run to avoid duplicates."
            echo "Skipping: existing PR found at $PR_URL"
          else
            echo "No existing open PR found — proceeding with Claude."
          fi
      - name: Run Claude Code
        if: steps.dedup.outputs.existing_pr_url == ''
        uses: anthropics/claude-code-action@51ea8ea73a139f2a74ff649e3092c25a904aed7e # v1.0.123
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GH_PAT_WORKFLOWS }}
          label_trigger: "claude"
          track_progress: "true"
          additional_permissions: |
            actions: read
            checks: read
          # yamllint disable rule:line-length
          claude_args: |
            --allowedTools "Bash(gh pr create:*),Bash(gh pr view:*),Bash(gh pr comment:*),Bash(gh issue comment:*),Bash(gh run view:*),Bash(gh run watch:*),Bash(gh api:*),Bash(gh label create:*),Edit,Write"
          # yamllint enable rule:line-length
          prompt: |
            Implement a fix for issue #${{ github.event.issue.number }}.

            **Standards-conformance rules — read these before writing any code:**

            - **For workflow files** (`.github/workflows/*.yml`): if a template
              exists in `petry-projects/.github/standards/workflows/` for what
              you're adding, **copy it verbatim** rather than writing from
              scratch. Available templates: `agent-shield.yml`, `claude.yml`,
              `dependabot-automerge.yml`, `dependabot-rebase.yml`,
              `dependency-audit.yml`, `feature-ideation.yml`. Fetch via:
              `gh api repos/petry-projects/.github/contents/standards/workflows/<file>.yml --jq '.content' | base64 -d`
              Adapt only when the file genuinely needs repo-specific content.

            - **For org standards** (labels, settings, rulesets, CODEOWNERS):
              read `petry-projects/.github/standards/` first via `gh api`.
              Match colors, names, and structure exactly. The full standards
              tree is at `petry-projects/.github/tree/main/standards/`.

            - **For SHA pinning** (Action Pinning Policy in
              `standards/ci-standards.md`): never guess or fabricate SHAs.
              Always look them up:
                * Tags:     `gh api repos/{owner}/{repo}/git/refs/tags/{tag} --jq '.object.sha'`
                * Branches: `gh api repos/{owner}/{repo}/branches/{branch} --jq '.commit.sha'`
              If the lookup fails, do not pin — open the PR with the action
              still using its tag and clearly explain the blocker in the PR
              body so a human can complete the fix.

            - **For CodeQL** (`codeql.yml`): all ecosystems present in the repo
              MUST be configured as CodeQL languages. Repos with
              `.github/workflows/*.yml` files MUST scan the `actions`
              ecosystem. Use a matrix strategy for multi-language repos.

            - **Do not skip the work** if previous comments say "blocked": the
              prior infrastructure issues that produced those comments may
              have been resolved. Attempt the fix; if you hit a *new* error,
              report the actual error message rather than referring to history.

            After implementing:
            1. Create a pull request with a clear title and description. Include "Closes #${{ github.event.issue.number }}" in the PR body.
            2. Self-review your own PR — look for bugs, style issues, missed edge cases, and test gaps. If you find problems, push fixes.
            3. Review all comments and review threads on the PR. For each one:
               - If you can address the feedback, make the fix, push, and mark the conversation as resolved.
               - If the comment requires human judgment, leave a reply explaining what you need.
            4. Check CI status. If CI fails, read the logs, fix the issues, and push again. Repeat until CI passes.
            5. When CI is green, all actionable review comments are resolved, and the PR is ready, read the CODEOWNERS file and leave a comment tagging the relevant code owners to review and merge.

  # Automation mode: agentic rebase — resolve conflicts when auto-rebase fails with a merge conflict (422)
  claude-rebase:
    # Trigger on the sentinel comment text alone; the login check is omitted
    # because when GH_PAT_WORKFLOWS is used the comment author is the PAT
    # owner, not 'github-actions[bot]'.
    if: >-
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '<!-- auto-rebase-conflict:') &&
      contains(fromJson('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
    concurrency:
      group: claude-rebase-${{ github.event.issue.number }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      id-token: write
      pull-requests: write
      issues: write
      actions: read
      checks: read
    steps:
      - name: Verify GH_PAT_WORKFLOWS is configured
        env:
          TOKEN: ${{ secrets.GH_PAT_WORKFLOWS }}
        run: |
          if [[ -z "$TOKEN" ]]; then
            echo "::error::GH_PAT_WORKFLOWS is required — GITHUB_TOKEN pushes skip CI. Set this secret to enable agentic rebase."
            exit 1
          fi
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT_WORKFLOWS }}
      - name: Run Claude Code
        uses: anthropics/claude-code-action@51ea8ea73a139f2a74ff649e3092c25a904aed7e # v1.0.123
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GH_PAT_WORKFLOWS }}
          # yamllint disable rule:line-length
          claude_args: |
            --allowedTools "Bash(gh pr checkout:*),Bash(gh pr view:*),Bash(gh pr comment:*),Bash(gh api:*),Bash(git*:*),Edit,Write"
          # yamllint enable rule:line-length
          # yamllint disable rule:line-length
          prompt: |
            The auto-rebase workflow detected a merge conflict on PR #${{ github.event.issue.number }}.

            Your job: check out the PR branch, rebase it onto the base branch, resolve all conflicts using best-effort judgement, push, and post a summary comment. If conflicts cannot be resolved safely, abort cleanly and post a clear failure comment with manual instructions.

            ## Steps

            ### 1. Configure git identity
            ```
            git config user.name "claude[bot]"
            git config user.email "claude[bot]@users.noreply.github.com"
            ```

            ### 2. Get PR details
            ```
            gh pr view ${{ github.event.issue.number }} --json number,headRefName,baseRefName,title
            ```

            ### 3. Check out the PR branch
            ```
            gh pr checkout ${{ github.event.issue.number }}
            ```

            ### 4. Rebase onto the base branch
            ```
            git fetch origin <baseRefName>
            git rebase origin/<baseRefName>
            ```
            (Use the actual `baseRefName` from step 2. Fetching the specific ref ensures
            `origin/<baseRefName>` is up to date even in non-default-branch scenarios.)

            ### 5. For each conflict, apply the appropriate resolution strategy

            **Workflow YAML files (`.github/workflows/*.yml`) — action pin conflicts:**
            - Read both versions (ours = base branch, theirs = PR branch).
            - If the conflict is a pinned SHA/tag for a `uses:` line, you MUST determine
              which side is newer before choosing a side:
              - For **tag pins** (e.g. `v3.1.2`), compare the tag names as semver — prefer the higher version.
              - For **SHA pins**, resolve each SHA to a commit date via the API:
                ```
                gh api repos/{owner}/{repo}/git/ref/tags/{tag} --jq '.object.sha'   # tag → SHA
                gh api repos/{owner}/{repo}/branches/{branch} --jq '.commit.sha'     # branch → SHA
                gh api repos/{owner}/{repo}/git/commits/{sha} --jq '.committer.date' # SHA → date
                ```
                Accept the side with the more recent commit date.
            - When the base branch has a newer or equal version, prefer the base branch (`git checkout --ours -- <file>`).
            - When the PR branch is provably newer, keep it (`git checkout --theirs -- <file>`).
            - If the version cannot be determined, treat it as ambiguous and abort (step 7b).
            - After resolving each file: `git add <file>`, then `git rebase --continue`.

            **All other files:**
            - Do not attempt to merge application-code conflicts.
            - Run `git rebase --abort` immediately and go to step 7b.
            - Application logic must be resolved by a human.

            ### 6. Push the rebased branch
            ```
            git push --force-with-lease
            ```

            ### 7a. On success — post a summary comment on PR #${{ github.event.issue.number }}
            Include:
            - Which files had conflicts and how each was resolved.
            - The new HEAD commit after rebase.

            ### 7b. On failure (rebase aborted) — post a failure comment on PR #${{ github.event.issue.number }}
            Include:
            - Which file(s) could not be resolved automatically and why.
            - Manual resolution steps:
              ```
              git fetch origin
              git rebase origin/<baseRefName>
              # resolve conflicts in <file(s)>
              git add <resolved-file(s)>
              git rebase --continue
              git push --force-with-lease
              ```
          # yamllint enable rule:line-length
