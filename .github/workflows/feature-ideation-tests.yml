# Quality gates for the reusable feature-ideation workflow and its
# supporting scripts.
#
# Triggered on any PR that touches:
#   - .github/workflows/feature-ideation*.yml
#   - .github/scripts/feature-ideation/**
#   - .github/schemas/signals.schema.json
#   - test/workflows/feature-ideation/**
#   - standards/workflows/feature-ideation.yml
#
# Gates (all must pass before merge):
#   1. shellcheck   — static analysis for every script in the suite
#   2. lint-prompt  — direct prompt blocks have no unescaped shell expansions
#   3. schema check — fixtures validate against signals.schema.json
#   4. bats         — full unit + integration test suite (~92 tests)
#
# Standard: this workflow enforces the contract documented in
# .github/scripts/feature-ideation/README.md.

name: Feature Ideation Tests

on:
  pull_request:
    paths:
      - '.github/workflows/feature-ideation*.yml'
      - '.github/scripts/feature-ideation/**'
      - '.github/schemas/signals.schema.json'
      - 'test/workflows/feature-ideation/**'
      - 'standards/workflows/feature-ideation.yml'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/feature-ideation*.yml'
      - '.github/scripts/feature-ideation/**'
      - '.github/schemas/signals.schema.json'
      - 'test/workflows/feature-ideation/**'
      - 'standards/workflows/feature-ideation.yml'

permissions:
  contents: read

