# Scheduled fleet sweep that brings every org repo up to the standard workflow
# stubs — the automation the compliance audit was missing (petry-projects/.github#851).
#
# The audit only *files* remediation issues; it never deploys. This workflow runs
# scripts/deploy-standard-workflows.sh across the fleet on the org cadence (and on
# demand), opening `standards-sync` PRs wherever a repo drifts — a missing required
# stub, or a stub pinned off its agent's current channel. Compliant repos open
# nothing (the deploy script is idempotent), and SKIP_REPOS / SKIP_OVERRIDES are
# respected by the script. This is a driver, not a reimplementation: all deploy
# logic lives in the script and its libs.
#
# Pairs with #850-B (auto-merge) so the sweep -> PR -> merge loop closes with no
# manual intervention.
name: Standards Deploy
# readme-report: Weekly fleet sweep that opens standards-sync PRs for repos drifted off the org-standard workflow stubs.

on:
  schedule:
    - cron: '0 8 * * 1'   # Every Monday at 08:00 UTC — offset from the Fri 12:00 UTC compliance audit
  workflow_dispatch:
    inputs:
      target_repo:
        description: 'Limit the sweep to a single repo (name). Leave blank to sweep the whole fleet.'
        required: false
        type: string
      target_workflow:
        description: 'Limit to a single workflow stub (e.g. dev-lead.yml). Leave blank for all deployable.'
        required: false
        type: string
      dry_run:
        description: 'Dry run — plan drift only, open no PRs'
        required: false
        default: false
        type: boolean

permissions: {}

concurrency:
  group: standards-deploy
  cancel-in-progress: false   # Let an in-flight sweep finish to avoid partial PR state

jobs:
  deploy:
    name: Sweep fleet and open standards-sync PRs
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read   # only to check out this repo; all cross-repo writes use the PAT below
    env:
      GH_TOKEN: ${{ secrets.ORG_SCORECARD_TOKEN }}
      TARGET_REPO: ${{ inputs.target_repo }}
      TARGET_WORKFLOW: ${{ inputs.target_workflow }}
      DRY_RUN: ${{ inputs.dry_run == true && 'true' || 'false' }}
    steps:
      - name: Checkout .github repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run standards-deploy fleet sweep
        run: bash scripts/standards-deploy-driver.sh
