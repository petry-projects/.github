name: Daily Org Status

on:
  schedule:
    - cron: '0 11 * * *'   # 6:00 AM CDT (UTC-5) — shifts to 5 AM in winter CST
  workflow_dispatch:         # allow manual trigger from Actions tab

permissions: {}              # no default permissions; each job grants only what it needs

jobs:
  report:
    name: Generate & post org status
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      issues: write          # create issue in this repo
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        # postinstall (node install.cjs) downloads the claude binary — required for the CLI to function
        run: npm install -g @anthropic-ai/claude-code@2.1.132  # NOSONAR: postinstall is the Anthropic binary fetcher, not an arbitrary script

      - name: Generate org status report
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_WORKFLOWS }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          chmod +x scripts/org_status.sh
          bash scripts/org_status.sh > /tmp/report.md
          [ -s /tmp/report.md ] || { echo "Report is empty — aborting"; exit 1; }

      - name: Truncate report if near GitHub issue body limit
        run: |
          MAX_BYTES=64000
          REPORT_SIZE=$(wc -c < /tmp/report.md)
          echo "Report size: ${REPORT_SIZE} bytes (limit: ${MAX_BYTES})"
          if [ "$REPORT_SIZE" -gt "$MAX_BYTES" ]; then
            echo "Truncating to line boundary near ${MAX_BYTES} bytes..."
            TRUNCATE_AT=$(python3 -c "
with open('/tmp/report.md', 'rb') as f:
    data = f.read($MAX_BYTES)
nl = data.rfind(b'\n')
print(nl + 1 if nl >= 0 else len(data))
")
            head -c "$TRUNCATE_AT" /tmp/report.md > /tmp/report_truncated.md
            printf '\n_Report truncated — exceeded GitHub issue body limit._\n' >> /tmp/report_truncated.md
            mv /tmp/report_truncated.md /tmp/report.md
            echo "Final size: $(wc -c < /tmp/report.md) bytes"
          fi

      - name: Create daily-report issue
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_WORKFLOWS }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          gh issue create \
            --repo petry-projects/.github \
            --title "Org Status — $DATE" \
            --body-file /tmp/report.md \
            --label daily-report
