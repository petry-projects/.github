name: Daily Org Status

on:
  schedule:
    - cron: '0 11 * * *'   # 6:00 AM CDT (UTC-5) — shifts to 5 AM in winter CST
  workflow_dispatch:         # allow manual trigger from Actions tab

jobs:
  report:
    name: Generate & post org status
    runs-on: ubuntu-latest
    permissions:
      issues: write          # create issue in this repo
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Generate org status report
        id: report
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_WORKFLOWS }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          chmod +x scripts/org_status.sh
          bash scripts/org_status.sh > /tmp/report.md
          echo "lines=$(wc -l < /tmp/report.md)" >> "$GITHUB_OUTPUT"

      - name: Create daily-report issue
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_WORKFLOWS }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          gh issue create \
            --repo petry-projects/.github \
            --title "Org Status — $DATE" \
            --body-file /tmp/report.md \
            --label daily-report
