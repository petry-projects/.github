# Reusable Dependabot update-and-merge workflow — single source of truth for the org.
# Repo-level dependabot-rebase.yml files call this to avoid duplicating
# the rebase/merge serialization logic.
# Standard: https://github.com/petry-projects/.github/blob/main/standards/dependabot-policy.md
#
# Problem: when branch protection requires branches to be up-to-date
# (strict status checks), merging one Dependabot PR makes the others fall
# behind. Dependabot does not auto-rebase PRs that are merely behind — it
# only rebases on its next scheduled run or when there are merge conflicts.
# Additionally, GitHub auto-merge (--auto) may not trigger when rulesets
# cause mergeable_state to report "blocked" even though all requirements
# are actually met.
#
# Solution: after every push to main (typically a merged PR), this workflow:
#   1. Posts "@dependabot rebase" on behind Dependabot PRs so Dependabot
#      updates the branch with its own identity — this triggers CI normally.
#      (Using the API update-branch endpoint with GITHUB_TOKEN does NOT
#      trigger CI workflow runs due to GitHub's recursive-trigger guard.)
#   2. Merges any Dependabot PR that is up-to-date, approved, and passing CI.
#
# Why @dependabot rebase instead of the update-branch API:
#   GitHub's GITHUB_TOKEN is subject to a security guard that prevents
#   events triggered by GITHUB_TOKEN from starting new workflow runs. When
#   update-branch is called with GITHUB_TOKEN, the resulting push to the PR
#   branch never triggers CI — the required checks (SonarCloud, build-and-
#   test, etc.) don't run, so the PR stays blocked. Dependabot's own push
#   (triggered by @dependabot rebase) bypasses this guard and CI runs
#   normally. The pull_request_target/synchronize event then fires and the
#   automerge workflow re-approves the PR.
#
# Note: @dependabot rebase is Dependabot rebasing its own branch, which
# preserves Dependabot's commit signature. This is distinct from using the
# update-branch API with rebase method (which force-pushes with GitHub's
# identity and breaks dependabot/fetch-metadata verification).
#
# Required org/repo secrets (passed explicitly by caller via secrets: mapping):
#   APP_ID         — GitHub App ID with contents:write and pull-requests:write
#   APP_PRIVATE_KEY — GitHub App private key
name: Dependabot update and merge (Reusable)

on:
  workflow_call:
    secrets:
      APP_ID:
        description: "GitHub App ID with contents:write and pull-requests:write"
        required: true
      APP_PRIVATE_KEY:
        description: "GitHub App private key"
        required: true

jobs:
  update-and-merge:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Check app secrets
        env:
          APP_ID: ${{ secrets.APP_ID }}
        run: |
          if [[ -z "$APP_ID" ]]; then
            echo "::error::APP_ID secret is missing. Set APP_ID and APP_PRIVATE_KEY in org secrets. See standards/dependabot-policy.md"
            exit 1
          fi

      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Update and merge Dependabot PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
        run: |
          # Find open Dependabot PRs
          PRS=$(gh pr list --repo "$REPO" --author "app/dependabot" \
            --json number,headRefName \
            --jq '.[] | "\(.number) \(.headRefName)"')

          if [[ -z "$PRS" ]]; then
            echo "No open Dependabot PRs"
            exit 0
          fi

          MERGED=false

          while IFS=' ' read -r PR_NUMBER HEAD_REF; do
            BEHIND=$(gh api "repos/$REPO/compare/main...$HEAD_REF" \
              --jq '.behind_by')

            if [[ "$BEHIND" -gt 0 ]]; then
              echo "PR #$PR_NUMBER ($HEAD_REF) is $BEHIND commit(s) behind"

              # Get the date of the most recent commit on the branch so we can
              # detect whether we already posted @dependabot rebase and are
              # waiting for Dependabot to process it.
              BRANCH_HEAD_DATE=$(gh api "repos/$REPO/commits/$HEAD_REF" \
                --jq '.commit.committer.date' 2>/dev/null || echo "")

              # Check for a @dependabot rebase comment posted AFTER the latest
              # branch commit. If one exists, we already requested a rebase and
              # Dependabot hasn't processed it yet — avoid spamming.
              if [[ -n "$BRANCH_HEAD_DATE" ]]; then
                # SC2016: $d is a jq variable (passed via --arg), not a shell variable.
                # shellcheck disable=SC2016
                PENDING=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json comments \
                  2>/dev/null | jq --arg d "$BRANCH_HEAD_DATE" \
                  '[.comments[] | select(.body == "@dependabot rebase" and .createdAt > $d)] | length' \
                  2>/dev/null || echo "0")
                if [[ "$PENDING" -gt 0 ]]; then
                  echo "  @dependabot rebase already requested — waiting for Dependabot to process"
                  continue
                fi
              fi

              # Post @dependabot rebase. Dependabot pushes to its own branch
              # with its own identity, which triggers CI normally. The
              # pull_request_target/synchronize event fires and the automerge
              # workflow re-approves (satisfying require_last_push_approval since
              # Dependabot is the pusher and the app bot is the approver).
              echo "  Requesting @dependabot rebase so Dependabot's push triggers CI"
              if GH_TOKEN="$APP_TOKEN" gh pr comment "$PR_NUMBER" --repo "$REPO" \
                --body "@dependabot rebase"; then
                echo "  Posted @dependabot rebase on PR #$PR_NUMBER"
              else
                echo "  Warning: failed to post @dependabot rebase on PR #$PR_NUMBER"
              fi
              continue
            fi

            echo "PR #$PR_NUMBER ($HEAD_REF) is up to date — checking if merge-ready"

            # Skip if we already merged one (strict mode means others are now behind)
            if [[ "$MERGED" == "true" ]]; then
              echo "  Skipping — already merged a PR this run"
              continue
            fi

            # Check if auto-merge is enabled (set by the automerge workflow)
            AUTO_MERGE=$(gh pr view "$PR_NUMBER" --repo "$REPO" \
              --json autoMergeRequest --jq '.autoMergeRequest != null')

            if [[ "$AUTO_MERGE" != "true" ]]; then
              echo "  Skipping — auto-merge not enabled"
              continue
            fi

            # Check the status check rollup. We need:
            #   - at least one completed check (so an empty rollup is NOT
            #     vacuously "passing"), and
            #   - every completed check is SUCCESS / NEUTRAL / SKIPPED, and
            #   - zero checks still pending.
            ROLLUP=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json statusCheckRollup)
            CHECKS_COMPLETED=$(echo "$ROLLUP" | \
              jq '[.statusCheckRollup[]? | select(.name != null and .status == "COMPLETED")] | length')
            CHECKS_PASS=$(echo "$ROLLUP" | \
              jq '[.statusCheckRollup[]? | select(.name != null and .status == "COMPLETED") | .conclusion] | all(. == "SUCCESS" or . == "NEUTRAL" or . == "SKIPPED")')
            CHECKS_PENDING=$(echo "$ROLLUP" | \
              jq '[.statusCheckRollup[]? | select(.name != null and .status != "COMPLETED")] | length')

            if [[ "$CHECKS_PENDING" -gt 0 ]]; then
              echo "  Skipping — $CHECKS_PENDING check(s) still pending"
              continue
            fi

            if [[ "$CHECKS_COMPLETED" -eq 0 ]]; then
              echo "  Skipping — no completed status checks (cannot confirm safety)"
              continue
            fi

            if [[ "$CHECKS_PASS" != "true" ]]; then
              echo "  Skipping — some checks failed"
              continue
            fi

            echo "  All checks pass — merging PR #$PR_NUMBER"
            # Use app token for merge so the resulting push to main is attributed to the
            # app bot — this triggers the workflow again via push event, enabling the
            # self-sustaining chain that serializes Dependabot PR merges one at a time.
            if GH_TOKEN="$APP_TOKEN" gh api "repos/$REPO/pulls/$PR_NUMBER/merge" \
              -X PUT -f merge_method=squash \
              --silent; then
              echo "  Merged PR #$PR_NUMBER"
              MERGED=true
            else
              echo "  Warning: failed to merge PR #$PR_NUMBER"
            fi
          done <<< "$PRS"
