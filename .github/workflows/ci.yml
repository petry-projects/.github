# CI pipeline for the .github standards repository.
# Lints markdown, YAML, GitHub Actions, shell scripts, and runs AgentShield.
# Standard: https://github.com/petry-projects/.github/blob/main/standards/ci-standards.md
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@ce4853d43830c74c1753b39f3cf40f71c2031eb9 # v23.0.0
        with:
          globs: '**/*.md'

      - name: Lint YAML
        run: |
          pip install --quiet yamllint
          yamllint -c <(cat <<'YAMLLINTRC'
          extends: default
          rules:
            line-length:
              max: 200
            truthy:
              check-keys: false
            document-start: disable
            comments:
              min-spaces-from-content: 1
          YAMLLINTRC
          ) .github/workflows/ standards/workflows/ standards/dependabot/

      - name: Lint GitHub Actions
        run: |
          # Install actionlint via verified download (pinned version + checksum)
          ACTIONLINT_VERSION="1.7.7"
          ACTIONLINT_SHA="023070a287cd8cccd71515fedc843f1985bf96c436b7effaecce67290e7e0757"
          curl -sLo actionlint.tar.gz "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          echo "${ACTIONLINT_SHA}  actionlint.tar.gz" | sha256sum -c -
          tar xzf actionlint.tar.gz actionlint
          chmod +x actionlint
          rm actionlint.tar.gz
          # Lint our own workflow files (fail on errors, ignore shellcheck style hints)
          ./actionlint -ignore 'SC2129' .github/workflows/*.yml
          # Template workflows use placeholder expressions — informational only
          ./actionlint -ignore 'context' standards/workflows/*.yml || true

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run ShellCheck
        run: |
          # Recurse so subdirectories like scripts/lib/ (sourceable libraries)
          # are linted too. -x follows `# shellcheck source=...` directives.
          shopt -s globstar nullglob
          shell_files=(scripts/**/*.sh)
          if [ ${#shell_files[@]} -gt 0 ]; then
            shellcheck --severity=warning -x "${shell_files[@]}"
          else
            echo "No shell scripts found — skipping"
          fi

  agent-security:
    name: Agent Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '20'

      - name: Run AgentShield
        run: |
          npx ecc-agentshield scan --path . --format json --min-severity high

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout (full history)
        # Pin to SHA per Action Pinning Policy (ci-standards.md#action-pinning-policy).
        # Look up current SHA: gh api repos/actions/checkout/git/refs/tags/v4 --jq '.object.sha'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install gitleaks
        # Install gitleaks CLI via verified download (pinned version + checksum).
        # Using the CLI directly avoids the gitleaks-action org license requirement.
        # To update: gh api repos/gitleaks/gitleaks/releases/assets/<id> -H "Accept: application/octet-stream" | grep linux_x64
        # Checksum source: gitleaks_8.24.0_checksums.txt (release asset ID 230829272)
        run: |
          GITLEAKS_VERSION="8.24.0"
          GITLEAKS_SHA="cb49b7de5ee986510fe8666ca0273a6cc15eb82571f2f14832c9e8920751f3a4"
          curl -sLo gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "${GITLEAKS_SHA}  gitleaks.tar.gz" | sha256sum -c -
          tar xzf gitleaks.tar.gz gitleaks
          chmod +x gitleaks
          rm gitleaks.tar.gz

      - name: Run gitleaks
        run: ./gitleaks detect --source . --redact --verbose --exit-code 1
