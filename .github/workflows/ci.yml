name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@5b7c9f74fec47e6b15667b2cc23c63dff11e449e # v9.0.0
        with:
          globs: '**/*.md'

      - name: Lint YAML
        run: |
          pip install --quiet yamllint
          yamllint -c <(cat <<'YAMLLINTRC'
          extends: default
          rules:
            line-length:
              max: 200
            truthy:
              check-keys: false
            document-start: disable
            comments:
              min-spaces-from-content: 1
          YAMLLINTRC
          ) .github/workflows/ standards/workflows/ standards/dependabot/

      - name: Lint GitHub Actions
        run: |
          # Install actionlint
          bash <(curl -s https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-bash.sh)
          # Lint all workflow files (our own and templates)
          ./actionlint .github/workflows/*.yml || true
          # Template workflows may use placeholder expressions — lint with relaxed mode
          ./actionlint -ignore 'context' standards/workflows/*.yml || true

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run ShellCheck
        run: |
          shellcheck --severity=warning scripts/*.sh

  agent-security:
    name: Agent Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '20'

      - name: Run AgentShield
        run: |
          npx ecc-agentshield scan --path . --format json --min-severity high
