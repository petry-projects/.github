# Quality gates for the pr-review-mention dispatcher and its supporting
# PR-URL resolution script.
#
# Triggered on any PR that touches:
#   - .github/workflows/pr-review-mention*.yml
#   - .github/scripts/pr-review-mention/**
#   - test/workflows/pr-review-mention/**
#   - standards/workflows/pr-review-mention.yml
#
# Gates (all must pass before merge):
#   1. shellcheck — static analysis for the resolver script
#   2. bats       — unit tests for PR-URL resolution + the empty-value guard (#500)

name: PR Review Mention Tests

on:
  pull_request:
    paths:
      - '.github/workflows/pr-review-mention*.yml'
      - '.github/scripts/pr-review-mention/**'
      - 'test/workflows/pr-review-mention/**'
      - 'standards/workflows/pr-review-mention.yml'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/pr-review-mention*.yml'
      - '.github/scripts/pr-review-mention/**'
      - 'test/workflows/pr-review-mention/**'
      - 'standards/workflows/pr-review-mention.yml'

permissions:
  contents: read

concurrency:
  group: pr-review-mention-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint and bats
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1

      - name: Install bats, shellcheck, and jq
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends bats shellcheck jq

      - name: shellcheck
        run: |
          set -euo pipefail
          shellcheck -x .github/scripts/pr-review-mention/resolve-pr-url.sh

      - name: Run bats suite
        run: bats --print-output-on-failure test/workflows/pr-review-mention/
